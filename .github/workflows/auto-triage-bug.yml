name: Auto-triage Bug

# Fires on:
#   - issue opened with Bug label
#   - Bug label added to an existing issue
#   - Revise label added (owner wants a re-plan based on their comments)
#
# v1.8.2 — propose-only flow. No auto-fixes ever. Agent always writes a plan;
# owner labels `Approved` (→ auto-build.yml) or `Revise` (→ re-runs this).

on:
  issues:
    types: [opened, labeled]

concurrency:
  group: auto-triage-${{ github.event.issue.number }}
  # cancel-in-progress: true — GitHub fires BOTH `opened` and `labeled` events
  # when an issue is created with a label, and both match the trigger. With
  # cancel-in-progress:false (the old default) they both ran, producing two
  # duplicate plan comments (see issue #28). With true, the second dispatch
  # cancels the first before it can post. A Revise event during an in-flight
  # triage also correctly supersedes it — Revise is the owner's explicit
  # re-plan signal and should win.
  cancel-in-progress: true

jobs:
  triage:
    # Trigger when: Bug label added, OR Revise label added, OR issue opened with Bug label
    # Skip bot-authored issues. Skip if already Proposed AND this isn't a Revise event.
    if: |
      github.event.issue.author_association != 'NONE' &&
      (
        (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'Bug')) ||
        (github.event.action == 'labeled' && (github.event.label.name == 'Bug' || github.event.label.name == 'Revise'))
      ) &&
      !(github.event.action == 'labeled' && github.event.label.name == 'Bug' && contains(github.event.issue.labels.*.name, 'Proposed'))

    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install repo deps
        run: npm ci

      - name: Install Claude Agent SDK + Anthropic SDK
        run: npm install --no-save --legacy-peer-deps @anthropic-ai/claude-agent-sdk @anthropic-ai/sdk

      - name: Run auto-triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER:      ${{ github.event.issue.number }}
          REPO:              ${{ github.repository }}
        run: node scripts/auto-triage-bug.mjs
